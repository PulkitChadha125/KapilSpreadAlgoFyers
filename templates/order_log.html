<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Log</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top left, #eef2ff 0, #f5f6ff 40%, #f9fafb 100%);
            color: #1f2933;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .navbar {
            background: linear-gradient(120deg, #5b21ff, #7c3aed, #ec4899);
            box-shadow: 0 10px 30px rgba(88, 28, 135, 0.35);
        }
        .navbar-brand { font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; font-size: 0.9rem; }
        .card {
            background-color: #fff;
            border: none;
            border-radius: 22px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.16);
        }
        .table-responsive { font-size: 0.85rem; }
        .table thead th { white-space: nowrap; }
        .event-badge { font-size: 0.75rem; }
        .filter-row { margin-bottom: 1rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid">
        <a href="/" class="navbar-brand mb-0 h1">Kapil Spread Algo</a>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-sm btn-outline-light">Symbol Settings</a>
            <a href="/strategy" class="btn btn-sm btn-outline-light">Strategy</a>
            <a href="/order-log" class="btn btn-sm btn-light">Order Log</a>
        </div>
    </div>
</nav>

<div class="container-fluid px-3 px-md-5" style="max-width: 1600px;">
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="mb-2">Order Log</h2>
            <p class="text-secondary mb-0">All trading decisions from the strategy (entries, target/stop updates, exits).</p>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body filter-row">
            <label class="form-label fw-semibold">Filters</label>
            <div class="d-flex flex-wrap align-items-end gap-3">
                <div>
                    <label class="form-label small mb-0">Symbol</label>
                    <select id="symbolFilter" class="form-select form-select-sm" style="width: auto;">
                        <option value="">All symbols</option>
                    </select>
                </div>
                <div>
                    <label class="form-label small mb-0">Time</label>
                    <select id="filterType" class="form-select form-select-sm" style="width: auto;">
                        <option value="all">All logs</option>
                        <option value="today">Today</option>
                        <option value="custom">Custom range</option>
                    </select>
                </div>
                <div id="customRangeBox" class="d-none d-flex align-items-end gap-2">
                    <div>
                        <label class="form-label small mb-0">From</label>
                        <input type="date" id="startDate" class="form-control form-control-sm">
                    </div>
                    <div>
                        <label class="form-label small mb-0">To</label>
                        <input type="date" id="endDate" class="form-control form-control-sm">
                    </div>
                    <button type="button" class="btn btn-sm btn-primary" id="applyFilterBtn">Apply</button>
                </div>
                <div class="ms-auto d-flex gap-2">
                    <button type="button" class="btn btn-sm btn-outline-secondary" id="refreshLogBtn" title="Refresh">
                        <i class="bi bi-arrow-clockwise"></i> Refresh
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-danger" id="deleteLogsBtn" title="Clear all order logs">
                        <i class="bi bi-trash"></i> Delete all logs
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-sm table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Timestamp</th>
                            <th>Event</th>
                            <th>Base Symbol</th>
                            <th>Call (CE)</th>
                            <th>Put (PE)</th>
                            <th>Price CE</th>
                            <th>Price PE</th>
                            <th>Combined</th>
                            <th>Target %</th>
                            <th>Stop %</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="log-body">
                        <tr><td colspan="11" class="text-center text-secondary">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    const filterType = document.getElementById('filterType');
    const symbolFilter = document.getElementById('symbolFilter');
    const customRangeBox = document.getElementById('customRangeBox');
    const startDate = document.getElementById('startDate');
    const endDate = document.getElementById('endDate');
    const applyFilterBtn = document.getElementById('applyFilterBtn');
    const refreshLogBtn = document.getElementById('refreshLogBtn');
    const deleteLogsBtn = document.getElementById('deleteLogsBtn');
    const logBody = document.getElementById('log-body');

    function loadSymbolOptions() {
        fetch('/order-log-symbols')
            .then(function (res) { return res.json(); })
            .then(function (symbols) {
                const sel = symbolFilter;
                const current = sel.value;
                sel.innerHTML = '<option value="">All symbols</option>';
                (symbols || []).forEach(function (s) {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = s;
                    sel.appendChild(opt);
                });
                if (current) sel.value = current;
            })
            .catch(function () {});
    }

    filterType.addEventListener('change', function () {
        customRangeBox.classList.toggle('d-none', this.value !== 'custom');
        if (this.value !== 'custom') loadLogs();
    });
    symbolFilter.addEventListener('change', function () { loadLogs(); });

    applyFilterBtn.addEventListener('click', function () { loadLogs(); });
    refreshLogBtn.addEventListener('click', function () { loadLogs(); });

    deleteLogsBtn.addEventListener('click', function () {
        if (!confirm('Delete all order log entries? This cannot be undone.')) return;
        deleteLogsBtn.disabled = true;
        fetch('/order-log-delete', { method: 'POST', headers: { 'Content-Type': 'application/json' } })
            .then(function (res) { return res.json(); })
            .then(function (data) {
                if (data.ok) {
                    loadSymbolOptions();
                    loadLogs();
                } else {
                    alert('Failed to delete logs: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(function () { alert('Failed to delete logs.'); })
            .finally(function () { deleteLogsBtn.disabled = false; });
    });

    function getQueryParams() {
        const f = filterType.value;
        const params = new URLSearchParams({ filter: f });
        if (symbolFilter.value) params.set('base_symbol', symbolFilter.value);
        if (f === 'custom') {
            if (startDate.value) params.set('start_date', startDate.value);
            if (endDate.value) params.set('end_date', endDate.value);
        }
        return params.toString();
    }

    async function loadLogs() {
        logBody.innerHTML = '<tr><td colspan="11" class="text-center text-secondary">Loading...</td></tr>';
        try {
            const res = await fetch('/order-log-data?' + getQueryParams());
            const data = await res.json();
            if (!Array.isArray(data)) {
                logBody.innerHTML = '<tr><td colspan="11" class="text-center text-danger">Failed to load logs.</td></tr>';
                return;
            }
            // Hide NO_STRIKE_IN_RANGE events from the web UI (still logged in CSV for audit)
            const visible = data.filter(function (r) { return r.event !== 'NO_STRIKE_IN_RANGE'; });

            if (visible.length === 0) {
                logBody.innerHTML = '<tr><td colspan="11" class="text-center text-secondary">No log entries for this filter.</td></tr>';
                return;
            }
            logBody.innerHTML = visible.map(function (r) {
                const eventClass = (r.event || '').indexOf('EXIT') !== -1 ? 'bg-warning text-dark' :
                    (r.event === 'ENTRY') ? 'bg-success' : (r.event === 'TARGET_STOPLOSS_UPDATED') ? 'bg-info text-dark' :
                    (r.event === 'NO_STRIKE_IN_RANGE') ? 'bg-secondary text-white' : 'bg-secondary';
                return '<tr>' +
                    '<td>' + (r.timestamp || '') + '</td>' +
                    '<td><span class="badge ' + eventClass + ' event-badge">' + (r.event || '') + '</span></td>' +
                    '<td>' + (r.base_symbol || '') + '</td>' +
                    '<td><code class="small">' + (r.call_symbol || '') + '</code></td>' +
                    '<td><code class="small">' + (r.put_symbol || '') + '</code></td>' +
                    '<td>' + (r.price_call !== '' && r.price_call != null ? r.price_call : '') + '</td>' +
                    '<td>' + (r.price_put !== '' && r.price_put != null ? r.price_put : '') + '</td>' +
                    '<td>' + (r.combined_price !== '' && r.combined_price != null ? r.combined_price : '') + '</td>' +
                    '<td>' + (r.target_pct !== '' && r.target_pct != null ? r.target_pct : '') + '</td>' +
                    '<td>' + (r.stop_pct !== '' && r.stop_pct != null ? r.stop_pct : '') + '</td>' +
                    '<td class="small text-secondary">' + (r.details || '') + '</td>' +
                    '</tr>';
            }).join('');
        } catch (e) {
            logBody.innerHTML = '<tr><td colspan="11" class="text-center text-danger">Error loading logs.</td></tr>';
        }
    }

    loadSymbolOptions();
    loadLogs();
})();
</script>
</body>
</html>
